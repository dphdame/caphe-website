name: SEO Validation

on:
  push:
    branches: [main, master]
    paths:
      - 'public/**/*.html'
      - 'public/sitemap.xml'
      - 'public/robots.txt'
  pull_request:
    branches: [main, master]
    paths:
      - 'public/**/*.html'
      - 'public/sitemap.xml'
      - 'public/robots.txt'

jobs:
  validate-seo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run SEO validation
        run: node scripts/validate-seo.js

      - name: SEO Check Summary
        if: always()
        run: |
          echo "## SEO Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "All SEO checks passed for caphegroup.org" >> $GITHUB_STEP_SUMMARY
          else
            echo "SEO validation found issues. Check the logs above." >> $GITHUB_STEP_SUMMARY
          fi
