<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="Authentication callback page for CAPHE member login.">
  <title>Signing in... - CAPHE</title>
  <link rel="stylesheet" href="/src/frontend/css/style.css?v=11">
  <style>
    .auth-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid var(--color-border);
      border-top-color: var(--color-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: var(--space-lg);
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .auth-error {
      background: rgba(244, 67, 54, 0.1);
      color: #c62828;
      padding: var(--space-lg);
      border-radius: var(--radius-md);
      max-width: 400px;
    }
  </style>
</head>
<body>
  <div class="auth-loading">
    <div class="spinner" id="spinner"></div>
    <h2 id="status-message">Signing you in...</h2>
    <p class="text-muted" id="status-detail">Please wait while we complete your login.</p>
    <div id="error-container" class="auth-error hidden"></div>
  </div>

  <script src="/api/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = (window.CAPHE_CONFIG && window.CAPHE_CONFIG.supabaseUrl) || '';
    const SUPABASE_ANON_KEY = (window.CAPHE_CONFIG && window.CAPHE_CONFIG.supabaseAnonKey) || '';

    async function handleAuthCallback() {
      const params = new URLSearchParams(window.location.search);
      const hashParams = new URLSearchParams(window.location.hash.substring(1));

      const token = params.get('token') || hashParams.get('access_token');
      const type = params.get('type') || hashParams.get('type');
      const next = params.get('next') || '/dashboard';
      const error = params.get('error') || hashParams.get('error');
      const errorDescription = params.get('error_description') || hashParams.get('error_description');

      // Check for errors
      if (error) {
        showError(errorDescription || error);
        return;
      }

      // Check for hash-based tokens (from Supabase redirect)
      const accessToken = hashParams.get('access_token');
      const refreshToken = hashParams.get('refresh_token');

      if (accessToken && refreshToken) {
        // Set the session directly
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const { data, error: sessionError } = await supabase.auth.setSession({
          access_token: accessToken,
          refresh_token: refreshToken
        });

        if (sessionError) {
          showError(sessionError.message);
          return;
        }

        // Redirect to dashboard
        window.location.href = next;
        return;
      }

      // Handle magic link token
      if (token && type) {
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Verify the OTP token
        const { data, error: verifyError } = await supabase.auth.verifyOtp({
          token_hash: token,
          type: type
        });

        if (verifyError) {
          showError(verifyError.message);
          return;
        }

        // Success - redirect to dashboard
        window.location.href = next;
        return;
      }

      // No valid tokens found
      showError('Invalid authentication callback. Please try logging in again.');
    }

    function showError(message) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('status-message').textContent = 'Login Failed';
      document.getElementById('status-detail').style.display = 'none';

      const errorContainer = document.getElementById('error-container');
      errorContainer.innerHTML = `
        <p>${message}</p>
        <p style="margin-top: var(--space-md);"><a href="/login">Return to Login</a></p>
      `;
      errorContainer.classList.remove('hidden');
    }

    // Run on page load
    handleAuthCallback();
  </script>
</body>
</html>
