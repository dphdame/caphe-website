<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Member Login - CAPHE</title>
  <meta name="description" content="Login to the CAPHE member area.">
  <link rel="stylesheet" href="/src/frontend/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-container">
      <a href="/" class="nav-logo">CAPHE</a>
      <div class="nav-links">
        <a href="/" class="nav-link">Home</a>
        <a href="/about.html" class="nav-link">About</a>
        <a href="/tools.html" class="nav-link">Tools</a>
        <a href="/contact.html" class="nav-link">Contact</a>
        <a href="/login.html" class="nav-link nav-link-cta active">Member Login</a>
      </div>
      <button class="nav-mobile-toggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- Login Section -->
  <div class="auth-container">
    <div class="auth-card">
      <h1 class="auth-title">Member Login</h1>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input type="email" id="email" name="email" class="form-input" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" name="password" class="form-input" required>
        </div>

        <button type="submit" class="btn btn-primary btn-large" style="width: 100%;">
          Sign In
        </button>

        <div id="login-status" class="mt-lg text-center hidden"></div>
      </form>

      <div class="auth-footer">
        <p>Don't have an account? <a href="/contact.html">Contact us</a> to join.</p>
        <p class="mt-lg"><a href="#" id="forgot-password">Forgot password?</a></p>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="border-top: none; padding-top: 0;">
        <p>&copy; 2024 CAPHE. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="/src/frontend/js/main.js"></script>
  <script src="/src/frontend/js/auth.js"></script>
</body>
</html>
